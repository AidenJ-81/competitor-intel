// ④ 공종 겹침 (15점): Xi C&A 주력 공종(GMP·반도체·DC·이차전지·산업플랜트) 경합 비율
function calcThreat(bids,comps){
  const total=bids.length;
  if(total===0) return comps.map(c=>({...c,threat:0,breakdown:null}));

  // ③ 분모: 낙찰/완료된 건들의 실제 금액 합
  const totalWonAmt=bids.reduce((s,b)=>{
    if(b.result==="우리낙찰") return s+(b.ourBid>0?b.ourBid:b.value||0);
    if(b.result==="타사낙찰"&&b.winner){
      const wAmt=b.competitorBids?.[b.winner];
      return s+(wAmt>0?wAmt:b.value||0);
    }
    return s;
  },0);

  return comps.map(comp=>{
    const involved=bids.filter(b=>b.competitors.includes(comp.name));
    const won=bids.filter(b=>b.winner===comp.name);
    if(involved.length===0) return {...comp,threat:0,breakdown:null};

    // ① 경합 빈도 (30점)
    const freq=Math.round((involved.length/total)*30);

    // ② 낙찰률 (35점)
    const wr=Math.round((won.length/involved.length)*35);

    // ③ 수주금액 비중 (20점) — 회사별 실제 낙찰금액 사용
    const compWonAmt=won.reduce((s,b)=>{
      const bidAmt=b.competitorBids?.[comp.name];
      return s+(bidAmt>0?bidAmt:b.value||0);
    },0);
    const val=totalWonAmt>0?Math.round((compWonAmt/totalWonAmt)*20):0;

    // ④ 공종 겹침 (15점)
    const typeM=involved.filter(b=>XI_TYPES.includes(b.type)).length;
    const type=Math.round((typeM/involved.length)*15);

    return {...comp,threat:freq+wr+val+type,breakdown:{freq,wr,val,type,cnt:involved.length,wCnt:won.length,compWonAmt}};
  });
}

// ─── API ──────────────────────────────────────────────────────
const API_URL="/api/messages";
const MODEL="claude-sonnet-4-6";
async function searchWithClaude(sys,prompt){
  const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:MODEL,max_tokens:2000,system:sys,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}
function parseJSON(raw){
  const t=raw.replace(/```json|```/g,"").trim();
  try{return JSON.parse(t);}catch{}
  const m=t.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0]);}catch{}}
  return null;
}

// ─── SVG Radar ────────────────────────────────────────────────
function RadarSVG({data,color}){
  const S=180,cx=90,cy=90,R=58,n=data.length;
  const ang=i=>(i*2*Math.PI)/n-Math.PI/2;
  const pt=(i,v)=>({x:cx+(v/100)*R*Math.cos(ang(i)),y:cy+(v/100)*R*Math.sin(ang(i))});
  const ax=i=>({x:cx+R*Math.cos(ang(i)),y:cy+R*Math.sin(ang(i))});
  const lb=i=>({x:cx+(R+19)*Math.cos(ang(i)),y:cy+(R+19)*Math.sin(ang(i))});
  const rp=r=>data.map((_,i)=>{const rr=(r/100)*R;return `${i===0?'M':'L'} ${cx+rr*Math.cos(ang(i))} ${cy+rr*Math.sin(ang(i))}`;}).join(' ')+' Z';
  const vp=data.map((d,i)=>pt(i,d.val));
  const poly=vp.map((p,i)=>`${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ')+' Z';
  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} style={{display:'block',margin:'0 auto'}}>
      {[25,50,75,100].map(r=><path key={r} d={rp(r)} fill="none" stroke="#1A3458" strokeWidth="0.5"/>)}
      {data.map((_,i)=>{const a=ax(i);return <line key={i} x1={cx} y1={cy} x2={a.x} y2={a.y} stroke="#1A3458" strokeWidth="0.5"/>;})}
      <path d={poly} fill={color} fillOpacity={0.18} stroke={color} strokeWidth={1.5}/>
      {vp.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3} fill={color}/>)}
      {data.map((d,i)=>{const l=lb(i);return <text key={i} x={l.x} y={l.y} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill="#6D90B8">{d.axis}</text>;})}
    </svg>
  );
}

function App(){
  const [view,setView]=useState("overview");
  const [tracked,setTracked]=useState(DEFAULT_TRACKED);
  const [selId,setSelId]=useState("dongbu_c");
  const [showSettings,setShowSettings]=useState(false);

  const [newsCache,setNewsCache]=useState({});

  const [pipelineCache,setPipelineCache]=useState({items:[],loading:false,error:null,time:null});

  const [chatIn,setChatIn]=useState("");

  const activeComps=useMemo(()=>TOP50.filter(c=>tracked.includes(c.id)).map(c=>({...c,color:getColor(c.id)})),[tracked]);
  const threatScores=useMemo(()=>bids.length>0?calcThreat(bids,activeComps):activeComps.map(c=>({...c,threat:0,breakdown:null})),[bids,activeComps]);
  const selComp=activeComps.find(c=>c.id===selId)||activeComps[0];

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  useEffect(()=>{
    (async()=>{
      try{const r=await fetch("/api/bids");const d=await r.json();if(Array.isArray(d.bids))setBids(d.bids);}catch{}
      try{const r=await fetch("/api/settings/tracked");const d=await r.json();if(Array.isArray(d.value)&&d.value.length)setTracked(d.value);}catch{}
    })();
  },[]);

  // 서버(SQLite) 저장 — 팀 공유. 입찰이력은 건별 추가/삭제로 서로 덮어쓰지 않음.
  const addBid=async bid=>{
    setBids(p=>[...p,bid]);
    try{await fetch("/api/bids",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(bid)});}catch{}
  };
  const removeBid=async id=>{
    setBids(p=>p.filter(b=>b.id!==id));
    try{await fetch(`/api/bids/${id}`,{method:"DELETE"});}catch{}
  };
  const saveTracked=async n=>{try{await fetch("/api/settings/tracked",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({value:n})});}catch{}};

  const fetchNews=async id=>{
    const comp=activeComps.find(c=>c.id===id);if(!comp)return;
    setNewsCache(p=>({...p,[id]:{...p[id],loading:true,error:null}}));
    try{
      const res=await fetch(`/api/news?company=${encodeURIComponent(comp.name)}`);
      const data=await res.json();
      if(data.error) throw new Error(data.error.message||"오류");
      if(data.articles)setNewsCache(p=>({...p,[id]:{articles:data.articles,loading:false,error:null,time:new Date()}}));
      else throw new Error("데이터 없음");
    }catch(e){setNewsCache(p=>({...p,[id]:{...p[id],loading:false,error:e.message}}));}
  };

  const fetchDart=async id=>{
    const comp=activeComps.find(c=>c.id===id);if(!comp)return;
    setDartCache(p=>({...p,[id]:{...p[id],loading:true,error:null}}));
    try{
      const res=await fetch(`/api/dart?company=${encodeURIComponent(comp.name)}`);
      const data=await res.json();
      if(data.error) throw new Error(data.error.message||"오류");
      if(data.disclosures)setDartCache(p=>({...p,[id]:{...data,loading:false,error:null,time:new Date()}}));
      else throw new Error("데이터 없음");
    }catch(e){setDartCache(p=>({...p,[id]:{...p[id],loading:false,error:e.message}}));}
  };

  const fetchPipeline=async()=>{
    setPipelineCache(p=>({...p,loading:true,error:null}));
    try{
      const text=await searchWithClaude("한국 건설업계 발주 전문 분석가. DART와 뉴스 검색 후 JSON만 반환.",`Xi C&A(GMP·클린룸·데이터센터·이차전지 전문) 수주 가능 최신 건설 발주 프로젝트 5~10개.\n{"projects":[{"project":"프로젝트명","client":"발주처","value":"금액(억원 또는 미정)","stage":"발주예정|설계중|신규|잠재|확정","type":"GMP의약품|반도체시설|데이터센터|이차전지|산업플랜트|기타","source":"DART공시|업계뉴스","chance":50,"rivals":[]}]}`);
      const parsed=parseJSON(text);
      if(parsed?.projects?.length)setPipelineCache({items:parsed.projects,loading:false,error:null,time:new Date()});
      else throw new Error("파싱 실패");
    }catch(e){setPipelineCache(p=>({...p,loading:false,error:e.message}));}
  };

  const sendChat=async()=>{
    if(!chatIn.trim()||chatLoading)return;
    const q=chatIn.trim();setChatIn("");
    const next=[...msgs,{role:"user",content:q}];
    setMsgs(next);setChatLoading(true);
    try{
      const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:MODEL,max_tokens:1000,system:CHAT_SYS,messages:next.slice(-8).map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      setMsgs(p=>[...p,{role:"assistant",content:data.content?.find(b=>b.type==="text")?.text||"응답 오류"}]);
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"⚠️ 연결 오류. 다시 시도해주세요."}]);}
    finally{setChatLoading(false);}
  };

  const isChat=view==="chat";
  return (
    <div style={{display:"flex",height:"100vh",background:T.bg0,fontFamily:"'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif",color:T.t1,overflow:"hidden"}}>
      <Sidebar view={view} setView={setView} tracked={tracked} newsCache={newsCache} onSettings={()=>setShowSettings(true)}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <Header view={view} bidsCount={bids.length} trackedCount={tracked.length}/>
        <div style={{flex:1,overflow:isChat?"hidden":"auto"}}>
          {!isChat&&<div style={{padding:"20px 22px"}}>
            {view==="overview"&&<Overview setView={setView} setSelId={setSelId} threatScores={threatScores} bidsCount={bids.length} activeComps={activeComps}/>}
            {view==="profiles"&&<Profiles selComp={selComp} setSelId={setSelId} threatScores={threatScores} activeComps={activeComps}/>}
            {view==="bids"&&<BidHistory bids={bids} addBid={addBid} removeBid={removeBid} threatScores={threatScores} activeComps={activeComps}/>}
            {view==="pipeline"&&<Pipeline pipelineCache={pipelineCache} fetchPipeline={fetchPipeline} activeComps={activeComps}/>}
            {view==="news"&&<NewsView newsCache={newsCache} fetchNews={fetchNews} activeComps={activeComps}/>}
            {view==="dart"&&<DartView dartCache={dartCache} fetchDart={fetchDart} activeComps={activeComps}/>}
          </div>}
          {isChat&&<ChatView msgs={msgs} input={chatIn} setInput={setChatIn} onSend={sendChat} loading={chatLoading} chatEnd={chatEnd}/>}
        </div>
      </div>
      {showSettings&&<SettingsPanel tracked={tracked} setTracked={setTracked} saveTracked={saveTracked} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

            </div>}
            {!ts.breakdown&&!selComp.strengths&&<div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"30px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
              <div style={{fontSize:22,opacity:.3}}>◑</div>
              <div style={{fontSize:12,color:T.t2,textAlign:"center"}}>입찰 이력을 추가하면<br/>위협도 분석이 표시됩니다</div>
            </div>}
          </div>
        </div>
        {(selComp.wins||selComp.clients)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {selComp.wins&&<div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"14px 16px"}}>
            <div style={{fontSize:11,fontWeight:700,marginBottom:10}}>주요 수주 실적</div>
            {selComp.wins.map(w=><div key={w} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8,fontSize:11,color:T.t2}}><div style={{width:5,height:5,borderRadius:"50%",background:selComp.color,marginTop:4,flexShrink:0}}/>{w}</div>)}
          </div>}
          {selComp.clients&&<div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"14px 16px"}}>

// ─── 입찰 이력 ────────────────────────────────────────────────
function BidHistory({bids,addBid,removeBid,threatScores,activeComps}){
  const TYPES=["GMP의약품","반도체시설","데이터센터","이차전지","산업플랜트","산업시설","기타"];
  const RESULTS=["우리낙찰","타사낙찰","진행중","유찰"];
  const RC={우리낙찰:T.green,타사낙찰:T.red,진행중:T.gold,유찰:T.t2};
  const INIT={project:"",type:"GMP의약품",value:"",competitors:[],ourBid:"",competitorBids:{},result:"진행중",winner:"",date:""};
  const [form,setForm]=useState(INIT);
  const [err,setErr]=useState("");
  const [showForm,setShowForm]=useState(true);
  const [tab,setTab]=useState("stats");

  const toggleComp=name=>setForm(f=>{
    if(f.competitors.includes(name)){
      const cb={...f.competitorBids};delete cb[name];
      return {...f,competitors:f.competitors.filter(c=>c!==name),competitorBids:cb};
    }
    return {...f,competitors:[...f.competitors,name]};
  });

  const submit=async()=>{
    if(!form.project.trim()){setErr("프로젝트명을 입력하세요");return;}
    if(!form.competitors.length){setErr("경쟁사를 최소 1개 선택하세요");return;}
    if(form.result==="타사낙찰"&&!form.winner){setErr("낙찰사를 선택하세요");return;}
    setErr("");
    const bid={id:Date.now().toString()+Math.random().toString(36).slice(2,7),project:form.project.trim(),type:form.type,value:parseFloat(form.value)||0,ourBid:parseFloat(form.ourBid)||0,competitorBids:Object.fromEntries(Object.entries(form.competitorBids).map(([k,v])=>[k,parseFloat(v)||0]).filter(([,v])=>v>0)),competitors:[...form.competitors],result:form.result,winner:form.result==="타사낙찰"?form.winner:"",date:form.date||new Date().toISOString().slice(0,7)};
    await addBid(bid);setForm(INIT);setShowForm(false);setTab("stats");
  };
  const remove=async id=>{await removeBid(id);};

  const totalBids=bids.length;
  const ourWins=bids.filter(b=>b.result==="우리낙찰").length;
  const theirWins=bids.filter(b=>b.result==="타사낙찰").length;
  const ongoing=bids.filter(b=>b.result==="진행중").length;
  const totalVal=bids.reduce((s,b)=>s+(b.value||0),0);
  const ourWinRate=totalBids>0?Math.round((ourWins/totalBids)*100):0;

  const compStats=activeComps.map(comp=>{
    const involved=bids.filter(b=>b.competitors.includes(comp.name));
    const theyWon=bids.filter(b=>b.winner===comp.name);
    const weWon=bids.filter(b=>b.result==="우리낙찰"&&b.competitors.includes(comp.name));
    // 실제 투찰금액 기준 (없으면 예정금액 fallback)
    const totalV=involved.reduce((s,b)=>{const a=b.competitorBids?.[comp.name];return s+(a>0?a:b.value||0);},0);
    const theirV=theyWon.reduce((s,b)=>{const a=b.competitorBids?.[comp.name];return s+(a>0?a:b.value||0);},0);
    const wr=involved.length>0?Math.round((theyWon.length/involved.length)*100):0;
    const types={};involved.forEach(b=>{types[b.type]=(types[b.type]||0)+1;});
    const topType=Object.entries(types).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";
    const ts=threatScores.find(t=>t.id===comp.id);
    const hasBidData=involved.filter(b=>b.competitorBids?.[comp.name]>0).length;
    const typeCount=bids.filter(b=>b.competitors.includes(comp.name)&&XI_TYPES.includes(b.type)).length;
    const typePct=involved.length>0?Math.round(typeCount/involved.length*100):0;
    return {comp,involved:involved.length,theyWon:theyWon.length,weWon:weWon.length,totalV,theirV,wr,topType,threat:ts?.threat||0,hasBidData,bd:ts?.breakdown||null,typeCount,typePct};
  }).sort((a,b)=>b.threat-a.threat);

  return (
    <div className="ci-fade">
      {totalBids>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:14}}>
        {[["총 입찰",`${totalBids}건`,T.teal],["우리 낙찰",`${ourWins}건`,T.green],["타사 낙찰",`${theirWins}건`,T.red],["진행중",`${ongoing}건`,T.gold],["우리 낙찰률",`${ourWinRate}%`,ourWinRate>=50?T.green:ourWinRate>=30?T.gold:T.red]].map(([l,v,c])=>(
          <div key={l} style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"14px 16px"}}>
            <div style={{fontSize:9,color:T.t2,marginBottom:6}}>{l}</div>
            <div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>
          </div>
        ))}
      </div>}

      <div style={{display:"grid",gridTemplateColumns:showForm?"1fr 300px":"1fr",gap:14}}>
        <div>
          {totalBids>0&&<div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            {[["stats","경쟁사 통계"],["history",`이력 목록 (${totalBids}건)`]].map(([id,label])=>(
              <div key={id} onClick={()=>setTab(id)} style={{padding:"6px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:tab===id?700:400,background:tab===id?T.teal:"transparent",color:tab===id?"#FFFFFF":T.t2,border:`1px solid ${tab===id?T.teal:T.b}`,transition:"all .12s"}}>{label}</div>
            ))}
            <div style={{marginLeft:"auto"}}><Btn onClick={()=>setShowForm(v=>!v)} color={T.teal}>{showForm?"폼 닫기":"+ 사례 추가"}</Btn></div>
          </div>}

          {(tab==="stats"||!totalBids)&&(
            totalBids===0
              ?<div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"60px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
                <div style={{fontSize:32,opacity:.3}}>◑</div>
                <div style={{fontSize:14,color:T.t2}}>입찰 사례를 추가하면 통계가 자동으로 집계됩니다</div>
                <div style={{fontSize:11,color:T.t3}}>경합 횟수 · 낙찰률 · 경합금액 · 위협도 자동 계산</div>
              </div>
              :<div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"1.4fr 70px 72px 72px 130px 100px 72px",padding:"10px 18px",background:T.bg3,borderBottom:`1px solid ${T.b}`,fontSize:9,color:T.t2,fontWeight:700}}>
                  <span>경쟁사</span><span style={{textAlign:"center"}}>경합</span><span style={{textAlign:"center"}}>상대낙찰</span><span style={{textAlign:"center"}}>우리낙찰</span><span style={{textAlign:"center"}}>상대 낙찰률</span><span style={{textAlign:"center"}}>경합금액</span><span style={{textAlign:"center"}}>위협도</span>
                </div>
                {compStats.map(s=>(
                  <div key={s.comp.id} style={{borderBottom:`1px solid ${T.b}`}}>
                    {/* 메인 행 */}
                    <div style={{display:"grid",gridTemplateColumns:"1.4fr 70px 72px 72px 130px 100px 72px",padding:"14px 18px",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:8,height:34,borderRadius:3,background:s.comp.color,flexShrink:0}}/>
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:s.comp.color}}>{s.comp.name}</div>
                          <div style={{fontSize:9,color:T.t3,marginTop:2}}>#{s.comp.rank} · {s.topType}</div>
                        </div>
                      </div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:s.involved>0?T.t1:T.t3}}>{s.involved}</div><div style={{fontSize:9,color:T.t3}}>건</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:s.theyWon>0?T.red:T.t3}}>{s.theyWon}</div><div style={{fontSize:9,color:T.t3}}>건</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:s.weWon>0?T.green:T.t3}}>{s.weWon}</div><div style={{fontSize:9,color:T.t3}}>건</div></div>
                      <div style={{padding:"0 4px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11}}>
                          <span style={{color:T.t2}}>{s.involved>0?"상대 낙찰률":"—"}</span>
                          {s.involved>0&&<span style={{fontWeight:700,color:s.wr>=60?T.red:s.wr>=35?T.gold:T.green}}>{s.wr}%</span>}
                        </div>
                        <div style={{background:T.b,borderRadius:4,height:6,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${s.wr}%`,background:s.wr>=60?T.red:s.wr>=35?T.gold:T.green,borderRadius:4}}/>
                        </div>
                      </div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:700,color:s.totalV>0?T.gold:T.t3}}>{s.totalV>0?`${s.totalV.toLocaleString()}억`:"—"}</div></div>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:20,fontWeight:900,color:s.comp.color}}>{s.threat||"—"}</div>
                        <div style={{background:T.b,borderRadius:3,height:3,overflow:"hidden",marginTop:4}}><div style={{height:"100%",width:`${s.threat}%`,background:s.comp.color,borderRadius:3}}/></div>
                      </div>
                    </div>
                    {/* 배점 근거 행 */}
                    {s.bd&&<div style={{padding:"0 18px 12px",display:"flex",gap:5,flexWrap:"wrap"}}>
                      {[
                        ["① 경합빈도",s.bd.freq,30,s.involved+"건 / 전체 "+totalBids+"건"],
                        ["② 낙찰률",s.bd.wr,35,"낙찰 "+s.theyWon+"건 / 참여 "+s.involved+"건"],
                        ["③ 수주금액",s.bd.val,20,s.theirV>0?s.theirV.toLocaleString()+"억":"투찰금액 미입력"],
                        ["④ 공종겹침",s.bd.type,15,"주력공종 "+s.typePct+"% ("+s.typeCount+"건)"],
                      ].map(function(item){
                        var label=item[0],score=item[1],max=item[2],basis=item[3];
                        return <div key={label} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:T.bg3,border:"1px solid "+T.b}}>
                          <span style={{fontSize:9,color:T.t2}}>{label}</span>
                          <span style={{fontSize:11,fontWeight:700,color:score>0?s.comp.color:T.t3}}>{score}</span>
                          <span style={{fontSize:9,color:T.t3}}>/{max}</span>
                          <span style={{fontSize:9,color:T.t3,borderLeft:"1px solid "+T.b,paddingLeft:5}}>{basis}</span>
                        </div>;
                      })}
                      <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 12px",borderRadius:20,background:s.comp.color+"18",border:"1px solid "+s.comp.color+"40"}}>
                        <span style={{fontSize:9,color:s.comp.color}}>합계</span>
                        <span style={{fontSize:12,fontWeight:800,color:s.comp.color}}>{s.threat}점</span>
                      </div>
                    </div>}
                  </div>
                ))}
                <div style={{padding:"8px 18px",fontSize:9,color:T.t3}}>위협도 = 경합빈도(30) + 상대낙찰률(35) + 수주금액비중(20) + 공종겹침(15) · 100점 만점</div>
              </div>
          )}

          {tab==="history"&&totalBids>0&&(
            <div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"18px 20px"}}>
              <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:"520px",overflowY:"auto"}}>
                {[...bids].reverse().map(b=>{const rc=RC[b.result];return(
                  <div key={b.id} style={{background:T.bg3,borderRadius:8,padding:"12px 14px",borderLeft:`3px solid ${rc}`,flexShrink:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <div style={{fontSize:12,fontWeight:600}}>{b.project}</div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{padding:"1px 7px",borderRadius:4,background:`${rc}14`,border:`1px solid ${rc}25`,fontSize:9,color:rc,fontWeight:700}}>{b.result}</span>
                        <span onClick={()=>remove(b.id)} style={{fontSize:13,color:T.t3,cursor:"pointer",padding:"1px 6px"}}>✕</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:10,fontSize:10,color:T.t2,flexWrap:"wrap",marginBottom:6}}>
                      <span>{b.type}</span>
                      {b.value>0&&<span>예정 <span style={{color:T.gold,fontWeight:600}}>{b.value.toLocaleString()}억</span></span>}
                      {b.date&&<span>{b.date}</span>}
                      {b.winner&&<span>낙찰: <span style={{color:T.red,fontWeight:600}}>{b.winner}</span></span>}
                    </div>
                    {(b.ourBid>0||Object.keys(b.competitorBids||{}).length>0)&&
                      <div style={{marginBottom:6,padding:"7px 10px",background:"rgba(0,0,0,.04)",borderRadius:6}}>
                        <div style={{fontSize:9,color:T.t3,marginBottom:4}}>투찰금액</div>
                        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                          {b.ourBid>0&&<span style={{fontSize:11,color:T.teal}}>우리 <span style={{fontWeight:700}}>{b.ourBid.toLocaleString()}억</span></span>}
                          {Object.entries(b.competitorBids||{}).map(([name,val])=>{
                            if(!val) return null;
                            const comp=activeComps.find(c=>c.name===name);
                            return <span key={name} style={{fontSize:11,color:comp?.color||T.t2}}>{name.slice(0,4)} <span style={{fontWeight:700}}>{Number(val).toLocaleString()}억</span></span>;
                          })}
                        </div>
                      </div>
                    }
                    {b.competitors.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{b.competitors.map(c=>{const comp=activeComps.find(x=>x.name===c);return <span key={c} style={{padding:"1px 7px",borderRadius:4,background:`${comp?.color||T.t2}14`,border:`1px solid ${comp?.color||T.t2}25`,fontSize:9,color:comp?.color||T.t2}}>⚔ {c}</span>;})}</div>}
                  </div>
                );})}
              </div>
            </div>
          )}
        </div>

        {showForm&&<div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"18px 20px",height:"fit-content",flexShrink:0}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:14}}>+ 입찰 사례 추가</div>
          <FL>프로젝트명</FL>
          <input className="ci-input" value={form.project} onChange={e=>setForm(f=>({...f,project:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="예: 풍림무약 천안공장" style={{width:"100%",background:T.bg3,border:`1px solid ${T.b}`,borderRadius:7,padding:"8px 12px",color:T.t1,fontSize:12,marginBottom:11}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:11}}>
            <div><FL>공종</FL><select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} style={{width:"100%",background:T.bg3,border:`1px solid ${T.b}`,borderRadius:7,padding:"8px 10px",color:T.t1,fontSize:11}}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
            <div><FL>금액 (억원)</FL><input className="ci-input" type="number" value={form.value} onChange={e=>setForm(f=>({...f,value:e.target.value}))} placeholder="예: 1300" style={{width:"100%",background:T.bg3,border:`1px solid ${T.b}`,borderRadius:7,padding:"8px 12px",color:T.t1,fontSize:12}}/></div>
          </div>
          <FL>경쟁 참여사 <span style={{color:T.t3,fontWeight:400}}>({activeComps.length}개사 중 선택)</span></FL>
          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:11,maxHeight:"160px",overflowY:"auto"}}>
            {activeComps.map(c=>{const sel=form.competitors.includes(c.name);return(
              <div key={c.id} onClick={()=>toggleComp(c.name)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:7,cursor:"pointer",background:sel?`${c.color}18`:T.bg3,border:`1px solid ${sel?c.color+"44":T.b}`,transition:"all .12s"}}>
                <div style={{width:5,height:5,borderRadius:"50%",background:sel?c.color:T.b,flexShrink:0}}/>
                <span style={{fontSize:11,fontWeight:sel?700:400,color:sel?c.color:T.t2,flex:1}}>{c.name}</span>
                <span style={{fontSize:9,color:T.t3}}>#{c.rank}</span>
              </div>
            );})}
          </div>
          {form.competitors.length>0&&<>
            <FL>투찰금액 <span style={{color:T.t3,fontWeight:400}}>(선택입력, 억원)</span></FL>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:11,padding:"10px 12px",background:T.bg3,borderRadius:8,border:`1px solid ${T.b}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{minWidth:70,fontSize:11,color:T.teal,fontWeight:700,flexShrink:0}}>우리</div>
                <input className="ci-input" type="number" value={form.ourBid} onChange={e=>setForm(f=>({...f,ourBid:e.target.value}))} placeholder="미입력" style={{flex:1,background:"rgba(0,0,0,.04)",border:`1px solid ${T.b}`,borderRadius:6,padding:"5px 9px",color:T.t1,fontSize:11}}/>
                <span style={{fontSize:10,color:T.t3,flexShrink:0}}>억원</span>
              </div>
              {form.competitors.map(name=>{
                const comp=activeComps.find(c=>c.name===name);
                return <div key={name} style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{minWidth:70,fontSize:10,color:comp?.color||T.t2,fontWeight:600,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name.slice(0,7)}</div>
                  <input className="ci-input" type="number" value={form.competitorBids[name]||""} onChange={e=>setForm(f=>({...f,competitorBids:{...f.competitorBids,[name]:e.target.value}}))} placeholder="미입력" style={{flex:1,background:"rgba(0,0,0,.04)",border:`1px solid ${T.b}`,borderRadius:6,padding:"5px 9px",color:T.t1,fontSize:11}}/>
                  <span style={{fontSize:10,color:T.t3,flexShrink:0}}>억원</span>
                </div>;
              })}
            </div>
          </>}
          <FL>입찰 결과</FL>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6,marginBottom:11}}>
            {RESULTS.map(r=>{const sel=form.result===r;const rc=RC[r];return <div key={r} onClick={()=>setForm(f=>({...f,result:r,winner:""}))} style={{padding:"7px",borderRadius:7,cursor:"pointer",background:sel?`${rc}18`:T.bg3,border:`1px solid ${sel?rc+"44":T.b}`,color:sel?rc:T.t2,fontSize:11,fontWeight:sel?700:400,textAlign:"center",transition:"all .12s"}}>{r}</div>;})}
          </div>
          {form.result==="타사낙찰"&&<><FL>낙찰사</FL><select value={form.winner} onChange={e=>setForm(f=>({...f,winner:e.target.value}))} style={{width:"100%",background:T.bg3,border:`1px solid ${T.b}`,borderRadius:7,padding:"8px 10px",color:form.winner?T.t1:T.t3,fontSize:12,marginBottom:11}}><option value="">선택하세요</option>{activeComps.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select></>}
          <FL>입찰 시기</FL>
          <input type="month" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{width:"100%",background:T.bg3,border:`1px solid ${T.b}`,borderRadius:7,padding:"8px 12px",color:T.t1,fontSize:12,marginBottom:14}}/>
          {err&&<div style={{fontSize:11,color:T.red,marginBottom:10}}>⚠ {err}</div>}
          <div onClick={submit} style={{width:"100%",padding:"10px",borderRadius:8,background:T.teal,color:"#FFFFFF",fontWeight:700,fontSize:12,textAlign:"center",cursor:"pointer"}}>추가</div>
        </div>}
      </div>
    </div>
  );
}

// ─── PIPELINE ─────────────────────────────────────────────────
function Pipeline({pipelineCache,fetchPipeline,activeComps}){
  const STATIC=[
    {project:"티씨케이 안성 3공장",client:"티씨케이",value:"280억",stage:"설계중",chance:75,rivals:["동부건설","성도이엔지"],type:"반도체시설"},
    {project:"대웅제약 오송 GMP시설",client:"대웅제약",value:"450억",stage:"발주예정",chance:60,rivals:["성도이엔지","SGC E&C"],type:"GMP의약품"},
    {project:"풍림무약 천안공장",client:"풍림무약",value:"1,300억",stage:"신규",chance:45,rivals:["동부건설","SGC E&C","코오롱글로벌"],type:"GMP의약품"},
    {project:"MICO 구미 세라믹 메가플랜트",client:"MICO그룹",value:"600억",stage:"설계중",chance:55,rivals:["SGC E&C"],type:"산업플랜트"},
    {project:"경동원 에코캠퍼스",client:"경동원",value:"191억",stage:"확정",chance:85,rivals:["성도이엔지"],type:"산업시설"},
    {project:"STT GDC 서울 하이퍼스케일 DC",client:"STT GDC Korea",value:"미정",stage:"잠재",chance:40,rivals:["코오롱글로벌","동부건설"],type:"데이터센터"},
  ];
  const SC={확정:"#34D399",설계중:"#3BACED",발주예정:"#F5A623",신규:"#8B5CF6",잠재:"#6D90B8"};
  const TC={"GMP의약품":"#34D399","반도체시설":"#3BACED","데이터센터":"#8B5CF6","이차전지":"#F59E0B","산업플랜트":"#F97316","산업시설":"#FB923C","기타":"#6D90B8"};
  function PCard({p,badge}){
    const pC=p.chance>=70?T.green:p.chance>=50?T.gold:T.red;
    const stC=SC[p.stage]||T.t2;const tyC=TC[p.type]||T.t2;
    return <div style={{background:T.bg3,borderRadius:9,padding:"14px 16px",display:"flex",gap:16,alignItems:"center"}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,flexWrap:"wrap"}}>
          <div style={{fontSize:13,fontWeight:600}}>{p.project}</div>
          <span style={{padding:"1px 7px",borderRadius:4,background:`${stC}14`,border:`1px solid ${stC}25`,fontSize:9,color:stC,fontWeight:600}}>{p.stage}</span>
          {badge&&<span style={{padding:"1px 7px",borderRadius:4,background:`${T.teal}14`,border:`1px solid ${T.teal}25`,fontSize:9,color:T.teal,fontWeight:700}}>{badge}</span>}
        </div>
        <div style={{display:"flex",gap:10,fontSize:11,color:T.t2,marginBottom:8,flexWrap:"wrap"}}>
          <span>발주처 <span style={{color:T.t1}}>{p.client}</span></span>
          <span>금액 <span style={{color:T.gold,fontWeight:700}}>{p.value}</span></span>
          <span style={{padding:"1px 7px",borderRadius:4,background:`${tyC}14`,border:`1px solid ${tyC}25`,fontSize:9,color:tyC}}>{p.type}</span>
        </div>
        {p.rivals?.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{p.rivals.map(r=>{const comp=activeComps.find(c=>c.name===r);return <span key={r} style={{padding:"2px 8px",borderRadius:4,background:`${comp?.color||T.t2}14`,border:`1px solid ${comp?.color||T.t2}25`,fontSize:9,color:comp?.color||T.t2}}>⚔ {r}</span>;})}</div>}
        {p.source&&<div style={{marginTop:6,fontSize:9,color:T.t3}}>출처: {p.source}</div>}
      </div>
      <div style={{textAlign:"center",minWidth:76,flexShrink:0}}>
        <div style={{fontSize:24,fontWeight:900,color:pC}}>{p.chance}%</div>
        <div style={{fontSize:9,color:T.t2,marginBottom:5}}>수주가능성</div>
        <div style={{height:5,background:T.b,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${p.chance}%`,background:pC,borderRadius:3}}/></div>
      </div>
    </div>;
  }
  return (
    <div className="ci-fade">
      <div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"18px 20px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div><div style={{fontSize:12,fontWeight:700}}>AI 발주 프로젝트 발굴</div><div style={{fontSize:10,color:T.t2,marginTop:3}}>정형 API가 없는 발주 예정 정보를 AI 웹검색으로 발굴합니다</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {pipelineCache.time&&<span style={{fontSize:10,color:T.t3}}>수집: {pipelineCache.time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</span>}
            <Btn onClick={fetchPipeline} loading={pipelineCache.loading} color={T.teal}>AI 발굴</Btn>
          </div>
        </div>
        {!pipelineCache.items.length&&!pipelineCache.loading&&!pipelineCache.error&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 0",gap:12}}><div style={{fontSize:28,opacity:.4}}>◫</div><div style={{fontSize:13,color:T.t2}}>AI 발굴 버튼을 누르면 발주 예정 프로젝트를 탐색합니다</div></div>}
        {pipelineCache.loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 0",gap:14}}><div style={{width:34,height:34,border:`3px solid ${T.teal}30`,borderTop:`3px solid ${T.teal}`,borderRadius:"50%"}} className="ci-spin"/><div style={{fontSize:13,color:T.t2}}>AI가 발주 예정 프로젝트를 탐색 중...</div></div>}
        {pipelineCache.error&&!pipelineCache.loading&&<div style={{display:"flex",alignItems:"center",gap:10,padding:16,background:T.bg3,borderRadius:8}}><span style={{color:T.red}}>⚠</span><span style={{fontSize:12,color:T.t2}}>오류: {pipelineCache.error}</span><Btn onClick={fetchPipeline} color={T.teal}>재시도</Btn></div>}
        {pipelineCache.items.length>0&&!pipelineCache.loading&&<div style={{display:"flex",flexDirection:"column",gap:10}}>{[...pipelineCache.items].sort((a,b)=>b.chance-a.chance).map((p,i)=><PCard key={i} p={p} badge="AI 발굴"/>)}</div>}
      </div>
      <div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"18px 20px"}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:16}}>기존 파이프라인 — {STATIC.length}건</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>{[...STATIC].sort((a,b)=>b.chance-a.chance).map((p,i)=><PCard key={i} p={p}/>)}</div>
      </div>
    </div>
  );
}

// ─── NEWS ─────────────────────────────────────────────────────
function NewsView({newsCache,fetchNews,activeComps}){
  const [selId,setSelId]=useState(activeComps[0]?.id||"");
  const comp=activeComps.find(c=>c.id===selId)||activeComps[0];
  const cache=comp?newsCache[comp.id]:null;
  const SEV={high:[T.red,"긴급"],medium:[T.gold,"주의"],low:[T.t2,"정보"]};
  const CAT={수주:"#20D9A0",재무:"#F59E0B",인사:"#8B5CF6",전략:"#3BACED",기타:"#6D90B8"};
  if(!comp) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,color:T.t2}}>경쟁사를 설정에서 추가하세요</div>;
  return (
    <div className="ci-fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{activeComps.map(c=><div key={c.id} onClick={()=>setSelId(c.id)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:selId===c.id?700:400,background:selId===c.id?`${c.color}18`:T.bg2,color:selId===c.id?c.color:T.t2,border:`1px solid ${selId===c.id?c.color+"33":T.b}`,transition:"all .12s"}}>{c.name}{newsCache[c.id]?.articles&&<span style={{marginLeft:5,fontSize:9}}>✓</span>}</div>)}</div>
        <Btn onClick={()=>fetchNews(comp.id)} loading={cache?.loading} color={comp.color}>{comp.name} 수집</Btn>
      </div>
      <div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"18px 20px",minHeight:400}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700}}>{comp.name} — 최신 뉴스</div>
          {cache?.time&&<div style={{fontSize:10,color:T.t3}}>수집: {cache.time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</div>}
        </div>
        {!cache&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:14}}><div style={{fontSize:32}}>◐</div><div style={{fontSize:13,color:T.t2}}>수집 버튼을 눌러 실시간 뉴스를 가져오세요</div></div>}
        {cache?.loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:16}}><div style={{width:36,height:36,border:`3px solid ${comp.color}30`,borderTop:`3px solid ${comp.color}`,borderRadius:"50%"}} className="ci-spin"/><div style={{fontSize:13,color:T.t2}}>네이버 뉴스에서 {comp.name} 기사 검색 중...</div></div>}
        {cache?.error&&!cache?.loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",height:200,justifyContent:"center",gap:10}}><div style={{fontSize:13,color:T.red}}>⚠ {cache.error}</div><Btn onClick={()=>fetchNews(comp.id)} color={comp.color}>다시 시도</Btn></div>}
        {cache?.articles&&!cache?.loading&&<div style={{display:"flex",flexDirection:"column",gap:10}}>{cache.articles.map((a,i)=>{const [sevC,sevL]=SEV[a.severity]||[T.t2,"정보"];const catC=CAT[a.category]||T.t2;return <div key={i} className="ci-fade" style={{background:T.bg3,borderRadius:9,padding:"14px 16px",borderLeft:`3px solid ${sevC}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}><span style={{padding:"2px 8px",borderRadius:4,background:`${comp.color}14`,border:`1px solid ${comp.color}25`,fontSize:9,color:comp.color,fontWeight:700}}>{comp.name}</span><span style={{padding:"2px 8px",borderRadius:4,background:`${catC}14`,border:`1px solid ${catC}25`,fontSize:9,color:catC}}>{a.category}</span><span style={{padding:"2px 8px",borderRadius:4,background:`${sevC}14`,border:`1px solid ${sevC}25`,fontSize:9,color:sevC,fontWeight:700}}>{sevL}</span></div><div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0}}><span style={{fontSize:10,color:T.t2}}>{a.source}</span><span style={{fontSize:10,color:T.t3}}>{a.date}</span></div></div><div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{a.link?<a href={a.link} target="_blank" rel="noopener noreferrer" style={{color:T.t1,textDecoration:"none"}}>{a.title} <span style={{fontSize:10,color:comp.color}}>↗</span></a>:a.title}</div><div style={{fontSize:11,color:T.t2,lineHeight:1.65}}>{a.summary}</div></div>;})} </div>}
      </div>
    </div>
  );
}

// ─── DART ─────────────────────────────────────────────────────
function DartView({dartCache,fetchDart,activeComps}){
  const [selId,setSelId]=useState(activeComps[0]?.id||"");
  const comp=activeComps.find(c=>c.id===selId)||activeComps[0];
  const cache=comp?dartCache[comp.id]:null;
  const TC={"사업보고서":"#20D9A0","분기보고서":"#3BACED","주요사항보고":"#EF4444","임원선임":"#8B5CF6","수시공시":"#F59E0B","기타":"#6D90B8"};
  if(!comp) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,color:T.t2}}>경쟁사를 설정에서 추가하세요</div>;
  return (
    <div className="ci-fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{activeComps.map(c=><div key={c.id} onClick={()=>setSelId(c.id)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:selId===c.id?700:400,background:selId===c.id?`${c.color}18`:T.bg2,color:selId===c.id?c.color:T.t2,border:`1px solid ${selId===c.id?c.color+"33":T.b}`,transition:"all .12s"}}>{c.name}{dartCache[c.id]?.disclosures&&<span style={{marginLeft:5,fontSize:9}}>✓</span>}</div>)}</div>
        <Btn onClick={()=>fetchDart(comp.id)} loading={cache?.loading} color={T.blue}>DART 조회</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:12}}>
        <div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"18px 20px",minHeight:400}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={{fontSize:12,fontWeight:700}}>{comp.name} — 최근 공시 목록</div>{cache?.time&&<div style={{fontSize:10,color:T.t3}}>조회: {cache.time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</div>}</div>
          {!cache&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:14}}><div style={{fontSize:32}}>◫</div><div style={{fontSize:13,color:T.t2}}>DART 조회 버튼을 눌러 공시 데이터를 가져오세요</div></div>}
          {cache?.loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:16}}><div style={{width:36,height:36,border:`3px solid ${T.blue}30`,borderTop:`3px solid ${T.blue}`,borderRadius:"50%"}} className="ci-spin"/><div style={{fontSize:13,color:T.t2}}>DART 공시 데이터 수집 중...</div></div>}
          {cache?.error&&!cache?.loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",height:200,justifyContent:"center",gap:10}}><div style={{fontSize:13,color:T.red}}>⚠ {cache.error}</div><Btn onClick={()=>fetchDart(comp.id)} color={T.blue}>다시 시도</Btn></div>}
          {cache?.disclosures&&!cache?.loading&&<div style={{display:"flex",flexDirection:"column",gap:8}}>{cache.disclosures.map((d,i)=>{const tC=TC[d.type]||T.t2;return <div key={i} style={{background:T.bg3,borderRadius:8,padding:"11px 14px",display:"flex",gap:12,alignItems:"center"}}><span style={{padding:"2px 8px",borderRadius:4,background:`${tC}14`,border:`1px solid ${tC}25`,fontSize:9,color:tC,fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>{d.type}</span><div style={{fontSize:12,fontWeight:600,flex:1}}>{d.link?<a href={d.link} target="_blank" rel="noopener noreferrer" style={{color:T.t1,textDecoration:"none"}}>{d.title} <span style={{fontSize:10,color:T.blue}}>↗</span></a>:d.title}</div><div style={{fontSize:10,color:T.t3,flexShrink:0}}>{d.date}</div></div>;})} </div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"16px 18px"}}>
            <div style={{fontSize:11,fontWeight:700,marginBottom:14}}>재무 하이라이트</div>
            {!cache?.financials&&<div style={{textAlign:"center",padding:"30px 0",color:T.t3,fontSize:11}}>조회 후 표시됩니다</div>}
            {cache?.financials&&!cache?.loading&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[["매출액",cache.financials.revenue,T.teal],["영업이익",cache.financials.op_profit,T.green],["순이익",cache.financials.net_profit,T.blue],["부채비율",cache.financials.debt_ratio,T.gold]].map(([k,v,c])=><div key={k} style={{background:T.bg3,borderRadius:7,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:11,color:T.t2}}>{k}</div><div style={{fontSize:13,fontWeight:700,color:c}}>{v||"—"}</div></div>)}
              {cache.financials.year&&<div style={{fontSize:9,color:T.t3,textAlign:"right",marginTop:4}}>기준: {cache.financials.year}년</div>}
            </div>}
          </div>
          {cache?.summary&&<div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:10,padding:"16px 18px"}}><div style={{fontSize:11,fontWeight:700,marginBottom:10}}>재무 동향 요약</div><div style={{fontSize:12,color:T.t2,lineHeight:1.7}}>{cache.summary}</div></div>}
        </div>
      </div>
    </div>
  );
}

// ─── CHAT ─────────────────────────────────────────────────────
function ChatView({msgs,input,setInput,onSend,loading,chatEnd}){
  const SUGG=["동부건설 대응 전략 알려줘","GMP 시장 경쟁사 분석","코오롱글로벌 데이터센터 강점 비교","수주 전략 추천해줘"];
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{flex:1,overflow:"auto",padding:"20px 22px"}}>
        {msgs.map((m,i)=><div key={i} className="ci-fade" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:16,gap:10}}>
          {m.role==="assistant"&&<div style={{width:30,height:30,borderRadius:8,background:`${T.teal}18`,border:`1px solid ${T.teal}35`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginTop:2}}>◎</div>}
          <div style={{maxWidth:"68%",padding:"11px 15px",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.role==="user"?T.teal:T.bg2,color:m.role==="user"?"#FFFFFF":T.t1,border:m.role==="assistant"?`1px solid ${T.b}`:"none",fontWeight:m.role==="user"?600:400}}>{m.content}</div>
        </div>)}
        {loading&&<div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}><div style={{width:30,height:30,borderRadius:8,background:`${T.teal}18`,border:`1px solid ${T.teal}35`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>◎</div><div style={{background:T.bg2,border:`1px solid ${T.b}`,borderRadius:12,padding:"12px 18px",display:"flex",gap:5,alignItems:"center"}}><div className="ci-d1" style={{width:6,height:6,borderRadius:"50%",background:T.teal}}/><div className="ci-d2" style={{width:6,height:6,borderRadius:"50%",background:T.teal}}/><div className="ci-d3" style={{width:6,height:6,borderRadius:"50%",background:T.teal}}/></div></div>}
        <div ref={chatEnd}/>
      </div>
      {msgs.length<=1&&<div style={{padding:"0 22px 12px",display:"flex",gap:7,flexWrap:"wrap"}}>{SUGG.map(s=><div key={s} onClick={()=>setInput(s)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${T.teal}30`,background:`${T.teal}0C`,fontSize:11,color:T.teal,cursor:"pointer"}}>{s}</div>)}</div>}
      <div style={{padding:"14px 22px",borderTop:`1px solid ${T.b}`,display:"flex",gap:10,background:T.bg1,flexShrink:0}}>
        <input className="ci-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&onSend()} placeholder="경쟁사 전략, 수주분석, 리스크 등을 질문하세요..." style={{flex:1,background:T.bg3,border:`1px solid ${T.b}`,borderRadius:9,padding:"9px 14px",color:T.t1,fontSize:13}}/>
        <div onClick={onSend} style={{padding:"9px 20px",borderRadius:9,background:loading?T.b:T.teal,color:loading?T.t2:"#FFFFFF",fontWeight:700,fontSize:12,cursor:loading?"not-allowed":"pointer",flexShrink:0}}>전송</div>
      </div>
    </div>
  );
}

// ─── 공통 컴포넌트 ────────────────────────────────────────────
function Btn({onClick,loading,color,children}){
  return <div onClick={!loading?onClick:undefined} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 16px",borderRadius:8,cursor:loading?"not-allowed":"pointer",background:`${color}18`,border:`1px solid ${color}35`,color,fontSize:11,fontWeight:700,opacity:loading?0.6:1,transition:"all .15s"}}>
    {loading&&<div style={{width:12,height:12,border:`2px solid ${color}40`,borderTop:`2px solid ${color}`,borderRadius:"50%"}} className="ci-spin"/>}
    {children}
  </div>;
}
function FL({children}){return <div style={{fontSize:10,color:T.t2,marginBottom:5,fontWeight:600}}>{children}</div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
